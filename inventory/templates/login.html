<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ERP Suite | Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-blue-900 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">

<div class="text-center mb-8">

<div class="w-20 h-20 mx-auto rounded-full bg-blue-600 flex items-center justify-center mb-5">

<i class="fa-solid fa-building text-white text-3xl"></i>

</div>

<h1 class="text-3xl font-bold text-slate-800">

ERP Suite

</h1>

<p class="text-gray-500 mt-2">

Enterprise Resource Planning System

</p>

</div>

{% if messages %}
{% for message in messages %}

<div class="bg-red-100 text-red-700 border border-red-200 rounded-xl p-3 mb-5 text-center">

{{ message }}

</div>

{% endfor %}
{% endif %}

<form method="POST" class="space-y-5">

{% csrf_token %}

<div>

<label class="block mb-2 text-gray-700 font-medium">

Username

</label>

<div class="relative">

<i class="fa-solid fa-user absolute left-4 top-4 text-gray-400"></i>

<input
type="text"
name="username"
required
class="w-full border rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-blue-500 focus:outline-none">

</div>

</div>

<div>

<label class="block mb-2 text-gray-700 font-medium">

Password

</label>

<div class="relative">

<i class="fa-solid fa-lock absolute left-4 top-4 text-gray-400"></i>

<input
type="password"
name="password"
required
class="w-full border rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-blue-500 focus:outline-none">

</div>

</div>

<button
type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">

Sign In

</button>

<a
href="{% url 'demo_login' %}"
class="w-full mt-3 inline-flex items-center justify-center bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition">

<i class="fa-solid fa-rocket mr-2"></i>
Explore Demo

</a>

</form>

<div class="text-center mt-6">

<p class="text-gray-500">

Don't have an account?

<a href="{% url 'signup' %}" class="text-blue-600 font-semibold hover:underline">

Create Account

</a>

</p>

</div>

</div>

</body>
</html>
