{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-10">

    <h1 class="text-3xl font-bold mb-8 text-[#88BDF2]">
        📦 Add Product
    </h1>

    <form method="POST" class="space-y-6">

        {% csrf_token %}

        <div>
            <label class="block mb-2 font-semibold">Product Name</label>
            {{ form.name }}
        </div>

        <div>
            <label class="block mb-2 font-semibold">Quantity</label>
            {{ form.quantity }}
        </div>

        <div>
            <label class="block mb-2 font-semibold">Price</label>
            {{ form.price }}
        </div>

        <button
            class="w-full bg-[#88BDF2] hover:bg-blue-500 text-white py-3 rounded-xl font-semibold">

            Save Product

        </button>

    </form>

</div>

{% endblock %}
